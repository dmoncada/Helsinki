name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".editorconfig"
      - ".swift-format"
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set XCode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build
        run: make build
